# ============================================================
# Docker Compose for the Automated Trading System
# Runs the trading system with monitoring dashboard
# ============================================================

version: "3.8"

services:
  # Main trading application
  trading-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-system
    ports:
      - "5000:5000"     # Monitoring dashboard & REST API
    volumes:
      - ./data:/app/data                   # Persistent database storage
      - ./logs:/app/logs                   # Persistent log files
      - ./reports:/app/reports             # Backtesting reports and charts
      - ./state:/app/state                 # Recovery state files
    environment:
      - PYTHONUNBUFFERED=1
      - TRADING_MODE=paper                 # Options: backtest, paper, live
      - INITIAL_BALANCE=${INITIAL_BALANCE:-100000}
      - LEVERAGE=${LEVERAGE:-1}
      - MAX_PORTFOLIO_EXPOSURE_PCT=${MAX_PORTFOLIO_EXPOSURE_PCT:-35}
      - FIXED_STOP_LOSS_USD=${FIXED_STOP_LOSS_USD:-0}
      - FIXED_TAKE_PROFIT_USD=${FIXED_TAKE_PROFIT_USD:-0}
      - TRAILING_STOP_ACTIVATION_USD=${TRAILING_STOP_ACTIVATION_USD:-0}
      - TRAILING_STOP_DISTANCE_USD=${TRAILING_STOP_DISTANCE_USD:-0}
      - DASHBOARD_AUTH_ENABLED=${DASHBOARD_AUTH_ENABLED:-false}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-suvendu}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - DASHBOARD_SECRET_KEY=${DASHBOARD_SECRET_KEY:-}
      - LOG_LEVEL=INFO
      # Optional: Slack webhook for alerts
      # - SLACK_WEBHOOK_URL=https://hooks.slack.com/services/your/webhook/url
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Override default command for paper trading mode
    command: ["python", "main.py", "--mode", "paper", "--balance", "${INITIAL_BALANCE:-100000}", "--leverage", "${LEVERAGE:-1}", "--dashboard-port", "5000"]

  # Backtesting service (run-once, generates reports)
  backtester:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-backtester
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "main.py", "--mode", "backtest", "--visualize"]
    profiles:
      - backtest    # Only starts when explicitly requested: docker compose --profile backtest up backtester
